version: '3.9'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app  # Ajustado para o seu WORKDIR
    ports:
      - 8000:8000
    env_file:
      - ./env.dev  # Certifique-se de que este arquivo existe!
    networks:
      - backend
    depends_on:
      - db

  db:
    image: postgres:15-alpine  # Sugestão de versão mais atual, mas a 13 funciona
    volumes:
      - postgres_data:/var/lib/postgresql/data/ # Corrigido o caminho interno do Postgres
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=bookstore_db
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data: